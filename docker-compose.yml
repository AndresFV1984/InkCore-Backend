# Postgres local alineado con application-dev.yaml (DB_URL / DB_USERNAME / DB_PASSWORD por defecto).
# Uso: docker compose up -d
# Luego arranca la app; Flyway usa indicolors_owner y la app runtime usa indicolors_app.
# No existe rol indicolors_migrator (ver ScriptBD/Script_Crear_BD).
services:
  postgres:
    image: postgres:16-alpine
    container_name: indicolors-postgres
    environment:
      POSTGRES_DB: inkcore
      POSTGRES_USER: indicolors_owner
      POSTGRES_PASSWORD: "indicolors2026!"
    ports:
      - "5432:5432"
    volumes:
      - indicolors-postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/docker-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indicolors_owner -d inkcore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  indicolors-postgres-data:

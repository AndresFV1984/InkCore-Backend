spring:
  application:
    name: InkCore-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: true

server:
  servlet:
    context-path: ${APP_CONTEXT:/InkCore-backend}
  tomcat:
    max-http-form-post-size: 6MB
    max-swallow-size: 6MB
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

springdoc:
  paths-to-exclude: /error,/error/**

# CORS: whitelist de orígenes (nunca *). Ver docs/CORS.md
app:
  cors:
    allowed-origins: []
    origins: ${CORS_ALLOWED_ORIGINS:}
    allow-credentials: false
    max-age-seconds: 3600


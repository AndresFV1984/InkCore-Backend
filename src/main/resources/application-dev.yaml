# Desarrollo local
# - Postgres: docker compose up -d
# - App runtime: indicolors_app | Flyway: indicolors_owner (o FLYWAY_MIGRATION_*)
# - Grants DML: ScriptBD/Script_Crear_BD (no hace falta script aparte)
# - Hot restart: spring-boot-devtools (recompilar → reinicio automático del contexto)
spring:
  devtools:
    restart:
      enabled: true
      # Windows / editores sin watcher nativo: polling del classpath
      poll-interval: 2s
      quiet-period: 1s
    livereload:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inkcore}
    username: ${DB_USERNAME:indicolors_app}
    password: ${DB_PASSWORD:5p5g+OQu9X6/cdi23jLKiTqSpAfgWCiS}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${DB_POOL_NAME:indicolorsHikariPool}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:15}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_THRESHOLD_MS:0}
      initialization-fail-timeout: ${DB_POOL_INIT_FAIL_TIMEOUT_MS:1}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        default_schema: indicolors

  main:
    lazy-initialization: ${SPRING_LAZY_INIT:false}

  data:
    jpa:
      repositories:
        enabled: true
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          max-wait: ${REDIS_POOL_MAX_WAIT:1s}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    create-schemas: true
    user: ${FLYWAY_MIGRATION_USER:indicolors_owner}
    password: ${FLYWAY_MIGRATION_PASSWORD:YyZUdfRUcjJmiFxrkr5DP77mZD4hlRo1}
    schemas: indicolors
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:false}
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:false}

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}

server:
  port: ${SERVER_PORT:8091}
  servlet:
    context-path: ${APP_CONTEXT:/InkCore-backend}
  tomcat:
    max-http-form-post-size: 6MB
    max-swallow-size: 6MB
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:50}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:10}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:200}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-operation-id: true
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
    persist-authorization: true
  paths-to-exclude: /error

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

security:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me}
    expiration-seconds: ${JWT_EXP_SECONDS:3600}
  dev:
    permit-all: ${SECURITY_PERMIT_ALL:false}
  refresh-token:
    expiration-seconds: ${REFRESH_EXP_SECONDS:1209600}
    rotate-on-refresh: ${REFRESH_ROTATE_ON_REFRESH:true}
    store:
      type: ${REFRESH_TOKEN_STORE_TYPE:memory}
  token-version-cache:
    type: ${TOKEN_VERSION_CACHE_TYPE:memory}
    ttl-seconds: ${TOKEN_VERSION_CACHE_TTL_SECONDS:60}
  password:
    max-failed-attempts: ${PASSWORD_MAX_FAILED_ATTEMPTS:5}
    lock-duration-minutes: ${PASSWORD_LOCK_DURATION_MINUTES:15}
    expiration-days: ${PASSWORD_EXPIRATION_DAYS:90}
    warning-days: ${PASSWORD_WARNING_DAYS:7}

# Frontend Vite (http://localhost:5173/inkcore/) — Origin sin path
app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
    allow-credentials: false
    max-age-seconds: 3600

logging:
  level:
    com.inkcore: DEBUG
    org.hibernate.orm.connections.pooling: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.redis: WARN
